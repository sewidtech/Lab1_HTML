<!-- Centred table at 80% width -->
<table align="center" width="80%" border="2" cellpadding="10">

  <!-- Row 1: all cells centred via TR -->
  <tr align="center">
    <td>Centre</td>
    <td>Centre</td>
    <td>Centre (TR sets all)</td>
  </tr>

  <!-- Row 2: last cell overridden to right align via TD -->
  <tr align="center">
    <td>Centre</td>
    <td>Centre</td>
    <td align="right">Right (TD overrides)</td>
  </tr>

  <!-- Row 3: tall row with valign top, middle, bottom -->
  <tr height="80">
    <td valign="top">Top</td>
    <td valign="middle">Middle</td>
    <td valign="bottom">Bottom</td>
  </tr>

</table>
